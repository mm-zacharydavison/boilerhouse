apiVersion: apps/v1
kind: Deployment
metadata:
  name: boilerhouse-trigger
  namespace: boilerhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boilerhouse-trigger
  template:
    metadata:
      labels:
        app: boilerhouse-trigger
    spec:
      serviceAccountName: boilerhouse-operator
      containers:
        - name: trigger
          image: boilerhouse-trigger:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: K8S_NAMESPACE
              value: boilerhouse
