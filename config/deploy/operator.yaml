apiVersion: v1
kind: ServiceAccount
metadata:
  name: boilerhouse-operator
  namespace: boilerhouse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: boilerhouse-operator
rules:
  - apiGroups: ["boilerhouse.dev"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["boilerhouse.dev"]
    resources: ["*/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "events"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["*"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: boilerhouse-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: boilerhouse-operator
subjects:
  - kind: ServiceAccount
    name: boilerhouse-operator
    namespace: boilerhouse
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boilerhouse-operator
  namespace: boilerhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: boilerhouse-operator
  template:
    metadata:
      labels:
        app: boilerhouse-operator
    spec:
      serviceAccountName: boilerhouse-operator
      containers:
        - name: operator
          image: boilerhouse-operator:latest
          env:
            - name: K8S_NAMESPACE
              value: boilerhouse
          ports:
            - containerPort: 8081
              name: health
            - containerPort: 9464
              name: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
