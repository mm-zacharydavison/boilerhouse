#!/usr/sbin/nft -f
#
# Boilerhouse container network isolation rules
#
# Blocks two attack vectors:
#   1. Cross-container traffic — container A scanning or hitting container B
#   2. Container-to-host traffic — a container reaching host services or the API
#
# All boilerhouse container IPs are within 10.89.0.0/16 (per-container /30 subnets).
# Outbound internet traffic (saddr 10.89.0.0/16, daddr outside 10.89.0.0/16) is
# forwarded normally by the existing FORWARD policy.
#
# Load:   nft -f /etc/nftables.d/boilerhouse.conf
# Reload: nft delete table inet boilerhouse; nft -f /etc/nftables.d/boilerhouse.conf

table inet boilerhouse {

    chain forward {
        type filter hook forward priority filter; policy accept;

        # Block direct traffic between boilerhouse container networks.
        # Both source and destination are within the boilerhouse range.
        # This prevents container A from scanning or connecting to container B.
        #
        # Traffic from 10.89.x.x to the internet is NOT blocked here because
        # the destination would be outside 10.89.0.0/16.
        ip saddr 10.89.0.0/16 ip daddr 10.89.0.0/16 drop
    }

    chain input {
        type filter hook input priority filter; policy accept;

        # Allow containers to receive responses to connections they initiated
        # (e.g. a health-check the host made into the container, then the
        # container's reply coming back up to the host network stack).
        ip saddr 10.89.0.0/16 ct state established,related accept

        # Block new inbound connections from containers to host services.
        # This prevents containers from hitting the boilerhouse API, databases,
        # or any other service bound to the host.
        ip saddr 10.89.0.0/16 ct state new drop
    }
}
