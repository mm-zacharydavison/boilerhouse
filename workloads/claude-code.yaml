# Prereq: create this Secret in the boilerhouse namespace before applying:
#
#   kubectl -n boilerhouse create secret generic anthropic-api \
#     --from-literal=key="<your Anthropic API key>"
#
apiVersion: boilerhouse.dev/v1alpha1
kind: BoilerhouseWorkload
metadata:
  name: claude-code
  namespace: boilerhouse
spec:
  version: "2026.3.26d"
  image:
    dockerfile: claude-code/Dockerfile
  resources:
    vcpus: 2
    memoryMb: 4096
    diskGb: 20
  network:
    access: restricted
    allowlist:
      - api.anthropic.com
      - statsig.anthropic.com
      - sentry.io
      - registry.npmjs.org
      - github.com
      - api.github.com
    expose:
      - guest: 7880
    websocket: /ws
    credentials:
      - domain: api.anthropic.com
        headers:
          - name: x-api-key
            valueFrom:
              secretKeyRef:
                name: anthropic-api
                key: key
  filesystem:
    overlayDirs:
      - /workspace
      - /home/claude
  idle:
    timeoutSeconds: 300
    action: hibernate
  health:
    intervalSeconds: 2
    unhealthyThreshold: 30
    httpGet:
      path: /health
      port: 7880
  entrypoint:
    cmd: node
    args: ["bridge.mjs"]
    workdir: /app
    env:
      ANTHROPIC_API_KEY: sk-ant-proxy-managed
      ANTHROPIC_BASE_URL: http://api.anthropic.com
      CLAUDE_MODEL: sonnet
      BRIDGE_PORT: "7880"
      WORKSPACE_DIR: /workspace
