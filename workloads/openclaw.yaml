apiVersion: boilerhouse.dev/v1alpha1
kind: BoilerhouseWorkload
metadata:
  name: openclaw
  namespace: boilerhouse
spec:
  version: "2026.3.24"
  image:
    # Use alpine for local dev. In production, build and push boilerhouse/openclaw:latest
    ref: alpine:3.19
  resources:
    vcpus: 2
    memoryMb: 2048
    diskGb: 10
  network:
    access: restricted
    allowlist:
      - api.anthropic.com
      - api.openai.com
      - registry.npmjs.org
    expose:
      - guest: 18789
    websocket: /
    credentials:
      - domain: api.anthropic.com
        headers:
          x-api-key: "${tenant-secret:ANTHROPIC_API_KEY}"
  filesystem:
    overlayDirs:
      - /root
  idle:
    timeoutSeconds: 60
    action: hibernate
    watchDirs:
      - /root/.openclaw
  entrypoint:
    cmd: sh
    args: ["-c", "while true; do sleep 3600; done"]
