# Telegram-triggered claude-code agent.
#
# Prereq: create this Secret in the boilerhouse namespace before applying:
#
#   kubectl -n boilerhouse create secret generic telegram-bot-token \
#     --from-literal=token="<your telegram bot token>"
#
# The tenantIds allowlist is injected by the preset script
# (bunx kadai run presets/<agent>). Do not edit directly.
apiVersion: boilerhouse.dev/v1alpha1
kind: BoilerhouseTrigger
metadata:
  name: tg-claude-code
  namespace: boilerhouse
spec:
  type: telegram
  workloadRef: claude-code
  tenant:
    from: usernameOrId
    prefix: "tg-"
  driver: claude-code
  guards:
    - type: allowlist
      config:
        tenantIds: ${TELEGRAM_ALLOWLIST_JSON}
        denyMessage: "You are not authorized to use this agent."
  config:
    botTokenSecretRef:
      name: telegram-bot-token
      key: token
    updateTypes: [message]
    pollTimeoutSeconds: 30
