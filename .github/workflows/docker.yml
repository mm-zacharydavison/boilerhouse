name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: Dockerfile
            target: api
          - name: trigger-gateway
            dockerfile: Dockerfile.trigger-gateway
          - name: dashboard
            dockerfile: Dockerfile.dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.name }}:latest
