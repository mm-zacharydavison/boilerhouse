name: Go

on:
  push:
    branches: [main, experimental/go]
    paths: ['go/**', 'config/**']
  pull_request:
    paths: ['go/**', 'config/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Install envtest binaries
        run: |
          cd go
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use -p path)" >> $GITHUB_ENV
      - name: Test
        run: cd go && go test ./... -timeout 300s
      - name: Vet
        run: cd go && go vet ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        binary: [operator, api, trigger]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: Build
        run: cd go && CGO_ENABLED=0 go build -o ../dist/${{ matrix.binary }} ./cmd/${{ matrix.binary }}/
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
